<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入成功 - 零門檻APP創作</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f3f4f6; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; max-width: 400px; }
        h1 { color: #673ab7; margin-bottom: 10px; }
        p { color: #555; font-size: 16px; line-height: 1.5; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #673ab7; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hint { font-size: 14px; color: #888; margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; }
        
        .manual-btn {
            color: white; 
            background-color: #673ab7; 
            font-weight: bold; 
            text-decoration: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            display: inline-block; 
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>登入成功！</h1>
        <div class="loader" id="loading-spinner"></div>
        <p id="main-message">正在將您導回「零門檻APP創作」應用程式...</p>
        <p class="hint" id="hint-text">如果應用程式沒有自動開啟，請點擊上方瀏覽器的「開啟」提示。<br><br><strong>您現在可以安全地關閉這個分頁了。</strong></p>
    </div>

    <script>
        function updateUI() {
            var search = window.location.search;
            var hash = window.location.hash;
            var fullParams = search + hash;
            
            if (fullParams.length < 10) return;
    
            var appLink = "io.supabase.texttoapk://login-callback/" + fullParams;
            var manualButtonHTML = '<a href="' + appLink + '" class="manual-btn">手動點此回到 App</a>';
    
            var ua = navigator.userAgent.toLowerCase();
            var isAndroid = ua.indexOf("android") > -1;
    
            if (isAndroid) {
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('main-message').innerHTML = "驗證已完成！<br>請點擊下方按鈕以返回應用程式。";
                document.getElementById('hint-text').innerHTML = manualButtonHTML;
            
            } else {
                window.location.href = appLink; 
            }
        }
    
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", updateUI);
        } else {
            updateUI();
        }
    </script>
</body>
</html>
